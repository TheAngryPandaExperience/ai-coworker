<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hathr Front-Door Coworker</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
        --bg: #f8fafc;
        --panel: #ffffff;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --accent-soft: #ccfbf1;
        --danger: #b91c1c;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #020617;
          --panel: #0f172a;
          --border: #334155;
          --text: #f8fafc;
          --muted: #94a3b8;
          --accent: #2dd4bf;
          --accent-soft: #134e4a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      header h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      header p {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: calc(100vh - 88px);
      }

      aside {
        border-right: 1px solid var(--border);
        padding: 1rem;
        background: var(--panel);
      }

      main {
        padding: 1rem 1.25rem 2rem;
      }

      .kbd-grid {
        display: grid;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      kbd {
        display: inline-block;
        padding: 0.1rem 0.4rem;
        border: 1px solid var(--border);
        border-radius: 0.35rem;
        font-size: 0.8rem;
        background: var(--bg);
      }

      .nav-item {
        width: 100%;
        text-align: left;
        padding: 0.75rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 0.65rem;
        background: var(--bg);
        color: inherit;
        cursor: pointer;
        margin-bottom: 0.5rem;
      }

      .nav-item.active {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .nav-item strong {
        display: block;
      }

      .nav-item span {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .panel {
        display: none;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 0.85rem;
        padding: 1rem 1.1rem;
      }

      .panel.active {
        display: block;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      .hint {
        color: var(--muted);
        font-size: 0.85rem;
        margin: -0.15rem 0 0.65rem;
      }

      input[type="text"],
      input[type="date"],
      textarea {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.55rem;
        font: inherit;
        background: var(--bg);
        color: inherit;
        margin-bottom: 0.85rem;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      button.primary {
        padding: 0.65rem 1rem;
        border: none;
        border-radius: 0.55rem;
        background: var(--accent);
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        padding: 0.65rem 1rem;
        border: 1px solid var(--border);
        border-radius: 0.55rem;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .status-bar {
        margin-top: 1rem;
        padding: 0.75rem 0.9rem;
        border-radius: 0.65rem;
        border: 1px solid var(--border);
        background: var(--panel);
        min-height: 3rem;
      }

      .status-bar.running {
        border-color: var(--accent);
      }

      .status-bar.error {
        border-color: var(--danger);
        color: var(--danger);
      }

      .summary-box {
        margin-top: 1rem;
        padding: 0.85rem 1rem;
        border: 1px dashed var(--border);
        border-radius: 0.65rem;
        white-space: pre-wrap;
        min-height: 120px;
        background: var(--bg);
      }

      .summary-box:empty::before {
        content: "Summary will appear here after a successful run.";
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Hathr Front-Door Coworker</h1>
      <p>
        Browser automation through app.hathr.ai with human rhythm. Each area loads
        independently.
      </p>
    </header>

    <div class="layout">
      <aside>
        <div class="kbd-grid">
          <div><kbd>F1</kbd> HPI</div>
          <div><kbd>F2</kbd> Medications &amp; Dx</div>
          <div><kbd>F3</kbd> Therapy</div>
          <div><kbd>Ctrl</kbd>+<kbd>Enter</kbd> Run active area</div>
          <div><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> Open login browser</div>
        </div>

        <nav id="area-nav" aria-label="Areas"></nav>

        <div class="actions">
          <button type="button" class="secondary" id="setup-btn">Setup Login</button>
        </div>
      </aside>

      <main>
        <section id="panels"></section>

        <div class="status-bar" id="status-bar" aria-live="polite">Ready.</div>
      </main>
    </div>

    <script>
      /** @type {Array<{id:string,label:string,description:string,shortcut:string}>} */
      let areas = [];
      /** @type {string} */
      let activeAreaId = "hpi";
      /** @type {boolean} */
      let running = false;

      const panelsEl = document.getElementById("panels");
      const navEl = document.getElementById("area-nav");
      const statusBar = document.getElementById("status-bar");
      const setupBtn = document.getElementById("setup-btn");

      const areaFields = {
        hpi: [{ name: "content", label: "Clinical source", type: "textarea", hint: "Paste chart notes, intake, or raw clinical text." }],
        "meds-dx": [
          { name: "date", label: "Selected date", type: "date", hint: "Medications and directions will be scoped to this date." },
          { name: "content", label: "Medication / diagnosis source", type: "textarea", hint: "Paste med list, MAR, or problem list data." },
        ],
        therapy: [
          { name: "dates", label: "Therapy dates", type: "text", hint: "Comma-separated dates, e.g. 2026-01-05, 2026-01-12" },
          { name: "content", label: "Therapy notes source", type: "textarea", hint: "Paste session notes covering those dates." },
        ],
      };

      function setStatus(message, kind = "") {
        statusBar.textContent = message;
        statusBar.className = "status-bar" + (kind ? ` ${kind}` : "");
      }

      function renderPanels() {
        panelsEl.innerHTML = areas
          .map((area) => {
            const fields = areaFields[area.id] ?? [];
            const fieldsHtml = fields
              .map(
                (field) => `
              <label for="${area.id}-${field.name}">${field.label}</label>
              <p class="hint">${field.hint ?? ""}</p>
              ${
                field.type === "textarea"
                  ? `<textarea id="${area.id}-${field.name}" data-field="${field.name}"></textarea>`
                  : `<input id="${area.id}-${field.name}" data-field="${field.name}" type="${field.type}" />`
              }`
              )
              .join("");

            return `
            <article class="panel${area.id === activeAreaId ? " active" : ""}" data-area="${area.id}">
              <h2>${area.label}</h2>
              <p class="hint">${area.description}</p>
              ${fieldsHtml}
              <div class="actions">
                <button type="button" class="primary run-btn" data-area="${area.id}">Run ${area.label} (${area.shortcut})</button>
              </div>
              <h3>Summary</h3>
              <div class="summary-box" id="summary-${area.id}"></div>
            </article>`;
          })
          .join("");

        panelsEl.querySelectorAll(".run-btn").forEach((btn) => {
          btn.addEventListener("click", () => runArea(btn.dataset.area));
        });
      }

      function renderNav() {
        navEl.innerHTML = areas
          .map(
            (area) => `
          <button type="button" class="nav-item${area.id === activeAreaId ? " active" : ""}" data-area="${area.id}">
            <strong>${area.label}</strong>
            <span>${area.shortcut} · ${area.description}</span>
          </button>`
          )
          .join("");

        navEl.querySelectorAll(".nav-item").forEach((btn) => {
          btn.addEventListener("click", () => selectArea(btn.dataset.area));
        });
      }

      function selectArea(areaId) {
        activeAreaId = areaId;
        document.querySelectorAll(".panel").forEach((panel) => {
          panel.classList.toggle("active", panel.dataset.area === areaId);
        });
        document.querySelectorAll(".nav-item").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.area === areaId);
        });
        const firstInput = document.querySelector(`.panel[data-area="${areaId}"] [data-field]`);
        firstInput?.focus();
      }

      function collectInput(areaId) {
        /** @type {Record<string, string>} */
        const input = {};
        document.querySelectorAll(`.panel[data-area="${areaId}"] [data-field]`).forEach((el) => {
          input[el.dataset.field] = el.value.trim();
        });
        return input;
      }

      async function runArea(areaId) {
        if (running) {
          setStatus("Already running. Wait for the current Hathr interaction to finish.", "running");
          return;
        }

        running = true;
        setStatus(`Running ${areaId}…`, "running");

        try {
          const response = await fetch("/api/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ areaId, input: collectInput(areaId), newChat: true }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error ?? "Run failed");
          }

          const summaryEl = document.getElementById(`summary-${areaId}`);
          if (summaryEl) {
            summaryEl.textContent = payload.summary;
          }
          setStatus(`${payload.label} complete. Saved to ${payload.savedTo}`);
        } catch (error) {
          setStatus(error.message ?? "Run failed", "error");
        } finally {
          running = false;
        }
      }

      async function setupLogin() {
        setStatus("Opening browser for manual login…", "running");
        setupBtn.disabled = true;
        try {
          const response = await fetch("/api/setup", { method: "POST" });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error ?? "Setup failed");
          }
          setStatus(payload.message ?? "Browser opened.");
        } catch (error) {
          setStatus(error.message ?? "Setup failed", "error");
        } finally {
          setupBtn.disabled = false;
        }
      }

      function connectEvents() {
        const source = new EventSource("/api/events");
        source.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === "status" && payload.message) {
              setStatus(payload.message, running ? "running" : "");
            }
            if (payload.type === "complete" && payload.summary) {
              const summaryEl = document.getElementById(`summary-${payload.areaId}`);
              if (summaryEl) {
                summaryEl.textContent = payload.summary;
              }
            }
            if (payload.type === "error" && payload.message) {
              setStatus(payload.message, "error");
            }
          } catch {
            /* ignore malformed events */
          }
        };
      }

      document.addEventListener("keydown", (event) => {
        if (event.key === "F1") {
          event.preventDefault();
          selectArea("hpi");
        } else if (event.key === "F2") {
          event.preventDefault();
          selectArea("meds-dx");
        } else if (event.key === "F3") {
          event.preventDefault();
          selectArea("therapy");
        } else if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === "s") {
          event.preventDefault();
          setupLogin();
        } else if (event.ctrlKey && event.key === "Enter") {
          event.preventDefault();
          runArea(activeAreaId);
        }
      });

      setupBtn.addEventListener("click", setupLogin);

      async function init() {
        const response = await fetch("/api/areas");
        const payload = await response.json();
        areas = payload.areas ?? [];
        renderPanels();
        renderNav();
        connectEvents();
        selectArea("hpi");
      }

      init();
    </script>
  </body>
</html>
